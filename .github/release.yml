changelog:
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Documentation and maintenance
      labels:
        - documentation
        - dependencies
        - ci
        - chore
    - title: Other changes
      labels:
        - "*"
